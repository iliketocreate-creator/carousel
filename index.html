<!DOCTYPE html>
<html lang="en">
    <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Carousel in Bootstrap</title>
    </head>
    <body>
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel"data-bs-interval="1000">
            <div class="carousel-inner" >
            <div class="carousel-item active">
        <img src="https://picsum.photos/800/300?2" class="d-block w-100" alt="Slide 2">
                 </div>
                 <div class="carousel-item">
                    <img src="https://picsum.photos/800/300?1" class="d-block w-100" alt="Slide 1">
                 </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
             </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
        </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
